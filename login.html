<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Smart Calendar</title>
    <link rel="stylesheet" href="css/auth-style.css">
</head>

<body>
    <div class="auth-card">
        <h1>Вітаємо у <span>Smart Calendar</span></h1>

        <form id="loginForm" novalidate>
            <div id="authResponse" class="auth-response"></div>
            <div class="input-group">
                <label>Електронна пошта</label>
                <input type="email" id="email" placeholder="example@mail.com">
                <div id="emailError" class="error-msg"></div>
            </div>

            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="••••••••">
                <div id="passError" class="error-msg"></div>
            </div>

            <button type="submit" class="login-btn">Увійти</button>
        </form>

        <p class="footer-text">Немає акаунта? <a href="#" id="showRegister">Зареєструватися</a></p>
    </div>

    <script>
        let isRegisterMode = false;
        const authCard = document.querySelector('.auth-card');
        const loginForm = document.getElementById('loginForm');
        const footerText = document.querySelector('.footer-text');

        function switchToRegister() {
            isRegisterMode = true;
            loginForm.innerHTML = `
                <div class="input-group">
                    <label>Ім'я</label>
                    <input type="text" id="regName" placeholder="Ваше ім'я">
                    <div id="nameError" class="error-msg"></div>
                </div>
                <div class="input-group">
                    <label>Електронна пошта</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com">
                    <div id="emailError" class="error-msg"></div>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Щонайменше 6 символів">
                    <div id="passwordError" class="error-msg"></div>
                </div>
                <div class="input-group">
                    <label>Підтвердіть пароль</label>
                    <input type="password" id="regConfirmPassword" placeholder="Повторіть пароль">
                    <div id="confirmPasswordError" class="error-msg"></div>
                </div>
                <button type="submit" class="login-btn">Зареєструватися</button>
            `;

            footerText.innerHTML = 'Вже є акаунт? <a href="#" id="showLogin">Увійти</a>';

            document.getElementById('loginForm').onsubmit = function(e) {
                e.preventDefault();
                handleRegister();
            };

            document.getElementById('showLogin').onclick = function(e) {
                e.preventDefault();
                switchToLogin();
            };
        }

        function showStatus(message, isSuccess) {
            const authResponse = document.getElementById('authResponse');
            authResponse.innerText = message;
            authResponse.className = 'auth-response ' + (isSuccess ? 'success' : 'error');
            authResponse.style.display = 'block';

            setTimeout(() => {
                authResponse.style.display = 'none';
            }, 5000);
        }

        function switchToLogin() {
            isRegisterMode = false;
            loginForm.innerHTML = `
                <div id="authResponse" class="auth-response"></div>
                <div class="input-group">
                    <label>Електронна пошта</label>
                    <input type="email" id="email" placeholder="example@mail.com">
                    <div id="emailError" class="error-msg"></div>
                </div>

                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="••••••••">
                    <div id="passError" class="error-msg"></div>
                    <a href="#" class="forgot-link">Забули пароль?</a>
                </div>

                <button type="submit" class="login-btn">Увійти</button>
            `;

            footerText.innerHTML = 'Немає акаунта? <a href="#" id="showRegister">Зареєструватися</a>';

            document.getElementById('loginForm').onsubmit = function(e) {
                e.preventDefault();
                handleLogin();
            };

            document.getElementById('showRegister').onclick = function(e) {
                e.preventDefault();
                switchToRegister();
            };
        }

        function handleLogin() {
            const email = document.getElementById('email');
            const pass = document.getElementById('password');
            const emailErr = document.getElementById('emailError');
            const passErr = document.getElementById('passError');

            emailErr.innerText = '';
            passErr.innerText = '';
            email.style.borderColor = '#ced4da';
            pass.style.borderColor = '#ced4da';

            if (!email.value) {
                emailErr.innerText = 'Будь ласка, введіть email';
                email.style.borderColor = '#dc3545';
                email.focus();
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                emailErr.innerText = 'Невірний формат email';
                email.style.borderColor = '#dc3545';
                email.focus();
                return;
            }

            if (!pass.value) {
                passErr.innerText = 'Будь ласка, введіть пароль';
                pass.style.borderColor = '#dc3545';
                pass.focus();
                return;
            }

            if (pass.value.length < 6) {
                passErr.innerText = 'Пароль повинен містити щонайменше 6 символів';
                pass.style.borderColor = '#dc3545';
                pass.focus();
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    "email": email.value,
                    "password": pass.value
                })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.message || 'Помилка авторизації');
                    });
                }
                return response.json();
            })
            .then(data => {
                localStorage.setItem('user', JSON.stringify(data));
                window.location.href = 'index.html';
            })
            .catch(error => {
                alert(error.message);
            });
        }

        function handleRegister() {
            const name = document.getElementById('regName');
            const email = document.getElementById('regEmail');
            const password = document.getElementById('regPassword');
            const confirmPassword = document.getElementById('regConfirmPassword');

            const nameErr = document.getElementById('nameError');
            const emailErr = document.getElementById('emailError');
            const passwordErr = document.getElementById('passwordError');
            const confirmPasswordErr = document.getElementById('confirmPasswordError');

            nameErr.innerText = '';
            emailErr.innerText = '';
            passwordErr.innerText = '';
            confirmPasswordErr.innerText = '';

            name.style.borderColor = '#ced4da';
            email.style.borderColor = '#ced4da';
            password.style.borderColor = '#ced4da';
            confirmPassword.style.borderColor = '#ced4da';

            if (!name.value) {
                nameErr.innerText = 'Будь ласка, введіть ваше ім\'я';
                name.style.borderColor = '#dc3545';
                name.focus();
                return;
            }

            if (!email.value) {
                emailErr.innerText = 'Будь ласка, введіть email';
                email.style.borderColor = '#dc3545';
                email.focus();
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                emailErr.innerText = 'Невірний формат email';
                email.style.borderColor = '#dc3545';
                email.focus();
                return;
            }

            if (!password.value) {
                passwordErr.innerText = 'Будь ласка, введіть пароль';
                password.style.borderColor = '#dc3545';
                password.focus();
                return;
            }

            if (password.value.length < 6) {
                passwordErr.innerText = 'Пароль повинен містити щонайменше 6 символів';
                password.style.borderColor = '#dc3545';
                password.focus();
                return;
            }

            if (!confirmPassword.value) {
                confirmPasswordErr.innerText = 'Будь ласка, підтвердіть пароль';
                confirmPassword.style.borderColor = '#dc3545';
                confirmPassword.focus();
                return;
            }

            if (password.value !== confirmPassword.value) {
                confirmPasswordErr.innerText = 'Паролі не співпадають';
                confirmPassword.style.borderColor = '#dc3545';
                confirmPassword.focus();
                return;
            }

            fetch('/api/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    "full_name": name.value,
                    "email": email.value,
                    "password": password.value
                })
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.message || 'Помилка реєстрації');
                    });
                }
                return response.json();
            })
            .then(data => {
                alert('Реєстрація успішна! Тепер ви можете увійти.');
                switchToLogin();
            })
            .catch(error => {
                alert(error.message);
            });
        }

        document.getElementById('showRegister').onclick = function(e) {
            e.preventDefault();
            switchToRegister();
        };

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            handleLogin();
        };
    </script>
    </div>
</body>

</html>
