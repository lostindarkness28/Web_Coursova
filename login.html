<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Smart Calendar</title>
    <link rel="stylesheet" href="css/auth-style.css">
</head>

<body>
    <div class="auth-card">
        <h1>Вітаємо у <span>Smart Calendar</span></h1>

        <button class="google-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                <path fill="none" d="M0 0h48v48H0z" />
            </svg>
            Увійти через Google
        </button>

        <div class="divider">
            <span>або</span>
        </div>

        <form id="loginForm" novalidate>
            <div class="input-group">
                <label>Електронна пошта</label>
                <input type="email" id="email" placeholder="example@mail.com">
                <div id="emailError" class="error-msg"></div>
            </div>

            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="password" placeholder="••••••••">
                <div id="passError" class="error-msg"></div>
                <a href="#" class="forgot-link">Забули пароль?</a>
            </div>

            <button type="submit" class="login-btn">Увійти</button>
        </form>

        <script>
            document.getElementById('loginForm').addEventListener('submit', function (e) {
                e.preventDefault();

                const email = document.getElementById('email');
                const pass = document.getElementById('password');
                const emailErr = document.getElementById('emailError');
                const passErr = document.getElementById('passError');

                
                emailErr.innerText = '';
                passErr.innerText = '';
                email.style.borderColor = '#ced4da';
                pass.style.borderColor = '#ced4da';

                
                if (!email.value.includes('@')) {
                    emailErr.innerText = 'Невірний формат пошти або логін не існує';
                    email.style.borderColor = 'red';
                } else if (pass.value.length < 4) {
                    passErr.innerText = 'Невірний пароль';
                    pass.style.borderColor = 'red';
                } else {
                    // Якщо все ок — перехід
                    window.location.href = 'index.html';
                }
            });
        </script>

        <p class="footer-text">Немає акаунта? <a href="#">Зареєструватися</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            window.location.href = 'index.html';
        });
    </script>
</body>

</html>
