<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Calendar Pro</title>
    <link rel="stylesheet" href="css/calendar-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <div class="logo">Smart <span>Calendar</span></div>
        <button class="add-event-btn" id="openModal">
            <i class="fas fa-plus"></i> Додати подію
        </button>

        <div class="mini-calendar">
            <div class="mini-header"><span id="miniHeader"></span></div>
            <div class="mini-grid" id="miniGrid"></div>
        </div>

        <nav class="sidebar-nav">
            <div class="category-title">Категорії</div>
            <label class="filter-item">
                <input type="checkbox" checked data-category="work"> <span class="dot blue"></span> Робота
            </label>
            <label class="filter-item">
                <input type="checkbox" checked data-category="personal"> <span class="dot green"></span> Особисте
            </label>
            <label class="filter-item">
                <input type="checkbox" checked data-category="important"> <span class="dot red"></span> Важливе
            </label>
        </nav>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <div class="header-left">
                <div class="nav-arrows">
                    <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
                    <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="month-wrapper">
                    <span class="month-display" id="monthBtn"></span>
                    <span class="year-display" id="yearBtn"></span>
                    <div class="picker-modal" id="yearPicker">
                        <div class="picker-grid year-grid" id="yearPickerGrid"></div>
                    </div>
                    <div class="picker-modal" id="monthPicker">
                        <div class="picker-grid month-grid" id="monthPickerGrid"></div>
                    </div>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Пошук подій...">
                <button id="searchButton"><i class="fas fa-search"></i></button>
                <button id="themeToggle" class="theme-toggle-btn"><i class="fas fa-moon"></i></button>
            </div>
            <div class="user-profile">
                <div class="avatar-container" id="profileBtn">
                     <div class="user-info-text">
                         <span class="user-name" id="userNameDisplay">Користувач</span>

                         <span class="user-status">Admin</span>
                     </div>
                    <img src="" alt="Avatar" class="avatar-img" id="displayAvatar">
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                    <div class="dropdown-header">
                        <p class="dropdown-user-name" id="dropdownUserName">Користувач</p>
                        <p class="dropdown-user-email" id="dropdownUserEmail">user@example.com</p>
                    </div>
                    <hr>
                    <a href="#" id="openProfileLink"><i class="fas fa-user-circle"></i> Мій профіль</a>
                    <a href="#" class="logout"><i class="fas fa-sign-out-alt"></i> Вийти</a>
                </div>
            </div>
        </header>
        <section class="calendar-grid" id="calendarGrid"></section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <h2>Нова подія</h2>
            <div class="input-group"><label>Назва</label><input type="text" id="eventTitle" placeholder="Що плануєте?">
            </div>
            <div class="input-group">
                <label>Категорія</label>
                <select id="eventCategory">
                    <option value="work">Робота</option>
                    <option value="personal">Особисте</option>
                    <option value="important">Важливе</option>
                </select>
            </div>
            <div class="input-group"><label>Дата</label><input type="date" id="eventDate"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" id="closeModal">Скасувати</button>
                <button class="btn-save" id="saveEventBtn">Зберегти</button>
                <button class="btn-delete" id="deleteEventBtn" style="display: none; background-color: #ff4d4d;">Видалити</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-card">
            <div class="profile-header-centered">
                <img src="" class="avatar-img-large" id="editAvatarPreview">
                <h2>Мій профіль</h2>
            </div>
            <div class="input-group"><label>Ім'я</label><input type="text" id="editUserName"></div>
            <div class="input-group"><label>Email</label><input type="email" id="editUserEmail"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" id="closeProfileModal">Закрити</button>
                <button class="btn-save" id="saveProfileBtn">Зберегти</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
